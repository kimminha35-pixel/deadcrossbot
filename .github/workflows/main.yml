name: Daily Stock Trend Bot

on:
  schedule:
    # 매일 한국시간 오전 8시(UTC 기준 23시)에 실행되도록 설정
    # UTC 시간 기준이므로 한국 시간에서 9시간을 빼서 적습니다.
    - cron: '0 22 * * 0-4' # 🌟 1-5를 0-4로 변경!
  workflow_dispatch: # 수동으로도 실행할 수 있게 해주는 옵션

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip' # 🌟 핵심!

    - name: 필요한 패키지 설치
      run: |
        pip install -r requirements.txt

    - name: 봇 실행
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python main.py
